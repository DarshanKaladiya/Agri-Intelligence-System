<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_potato" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>
  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="45" fill="url(#grad_potato)" opacity="0.1">
      <animate attributeName="r" values="40;45;40" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3s" repeatCount="indefinite" />
    </circle>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,2; 0,-2; 0,2" dur="2s" repeatCount="indefinite" />
      <text x="0" y="5" font-size="50" text-anchor="middle" dominant-baseline="middle">🥔</text>
    </g>
  </g>
</svg>